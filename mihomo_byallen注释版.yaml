# 必读！！！
# 1. 规则在满足自己需求情况下，尽量做到精简，不要过度复杂，以免影响性能。

# ----------------------------------------------------------
# 🔗 代理集 (机场/订阅源)
# ----------------------------------------------------------
proxy-providers:
  v2tun:
    url: "https://123"
    type: http
    interval: 46400        # 更新间隔（秒）
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连            # 通过直连去下载订阅
  备用:
    url: "https://123"
    type: http
    interval: 46400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连
  白菜:
    url: "https://dy.winxxxxx.com/s/xxxxxxx"
    type: http
    interval: 46400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连    
  自建:
    url: "https://123"
    type: http
    interval: 46400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 🇺🇲 美国节点     # 通过美国节点下载自建订阅（防止域名无法访问）

# ----------------------------------------------------------
# 🛡️ 节点信息
# ----------------------------------------------------------
proxies:
  - {name: 直连, type: direct}

# ----------------------------------------------------------
# ⚙️ 全局配置 (基础运行参数)
# ----------------------------------------------------------
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7894
allow-lan: true
bind-address: "*"
ipv6: true
unified-delay: true
tcp-concurrent: true
log-level: warning
find-process-mode: 'off'
global-client-fingerprint: chrome
profile:
  store-selected: true
  store-fake-ip: true

# ----------------------------------------------------------
# 👃 嗅探器
# ----------------------------------------------------------
sniffer:
  enable: true
  sniff:
    HTTP: {ports: [80, 8080-8880], override-destination: true}
    TLS: {ports: [443, 8443]}
    QUIC: {ports: [443, 8443]}
  skip-domain:
    - "+.baidu.com"
    - 'Mijia Cloud'
    - '+.push.apple.com'
    - '+.wechat.com'
    - '+.qpic.cn'
    - '+.qq.com'
    - '+.wechatapp.com'

# ----------------------------------------------------------
# 🚇 TUN 模式
# ----------------------------------------------------------
tun:
  enable: true
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"] 
  auto-route: true         
  auto-redirect: true      
  auto-detect-interface: true 

# ----------------------------------------------------------
# 🌐 DNS 模块
# ----------------------------------------------------------
dns:
  enable: true
  listen: 0.0.0.0:53
  ipv6: true
  use-system-hosts: true
  use-hosts: true
  enhanced-mode: redir-host
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter: ['+.lan', '+.local', 'time.*.com', 'ntp.*.com', '*.m-team.cc']
  default-nameserver: [223.5.5.5]
  proxy-server-nameserver: [https://223.5.5.5/dns-query]
  nameserver: [223.5.5.5, 119.29.29.29]

# ----------------------------------------------------------
# 🚩 出站策略组
# ----------------------------------------------------------
