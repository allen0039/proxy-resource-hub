# 功能说明：MitM 为重写脚本提供 HTTPS 解密；只应包含实际需要处理的 hostname。
# skip_validating_cert=false 会校验上游证书；p12 与 passphrase 属于私密材料，公开前必须脱敏。
# hostname 中以 - 开头的项目表示排除，不对该域名执行 MitM。
skip_validating_cert = false
hostname = -consumer.fcbox.com, -*huami.com, -weather-data.apple.com, -*amemv.com, -*snssdk.com, -www.google.com
