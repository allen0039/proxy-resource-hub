# Allen 维护 - Quantumult X 配置
# ===================================================================
# 维护原则
# - 本地文件包含私有订阅和 MitM 材料，公开版本必须通过脱敏工具生成。
# - enabled=true 表示启用资源，false 表示保留但禁用。
# - 新增规则前先检查远程规则是否已经覆盖，避免重复或策略冲突。
#
# 全局参数与 DNS
# - server_check_url 用于节点测速；excluded_routes 保留局域网和保留地址直连。
# - dns_exclusion_list 用于避免银行、运营商等域名的解析异常。
# - 指定域名使用国内 DNS，路由器和 NAS 等内网域名使用 system。
#
# 策略组
# - 业务组优先提供优选组和地区组，再提供 Proxy、direct 等兜底候选。
# - 地区组使用完整地区名称、旗帜或标准缩写匹配，避免短词造成串组。
# - CDN 独立选择出口，Cloudflare 与通用 CDN 规则统一交给该策略组。
#
# 远程订阅与分流
# - 订阅地址属于本地私有信息，不在维护说明中记录具体值。
# - 远程规则通过 force-policy 指向策略组；具体业务规则位于 CDN 和通用规则之前。
# - 新增业务组时同步添加对应分流规则，并确认策略组名称存在。
#
# 本地规则
# - 依次分为：局域网管理、Apple 与系统、直连与 PT、技术工具、AI 与媒体、
#   特殊站点、拦截修正、最终规则。
# - qB 下载器源地址直连规则必须保持在本地规则最前面。
# - Quantumult X 按规则类型和匹配精度处理规则，不能只依赖文本顺序覆盖冲突。
#
# 重写、任务与 MitM
# - 修改重写资源后同步检查 [mitm] hostname；分享配置前必须运行脱敏工具。
# - hostname 中带 - 前缀的域名表示排除 MitM。
# ===================================================================

[general]
server_check_url=http://cp.cloudflare.com/generate_204
dns_exclusion_list=*.cmpassport.com, *.jegotrip.com.cn, *.icitymobile.mobi, id6.me
geo_location_checker=http://ip-api.com/json/?lang=zh-CN, https://raw.githubusercontent.com/Orz-3/Orz-3/master/QuantumultX/IP.js
resource_parser_url=https://fastly.jsdelivr.net/gh/KOP-XIAO/QuantumultX@master/Scripts/resource-parser.js
excluded_routes=192.168.0.0/16, 172.16.0.0/12, 100.64.0.0/10, 10.0.0.0/8, 127.0.0.0/8, 239.255.255.250/32
server_check_timeout=2000
udp_whitelist=1-442, 444-65535

