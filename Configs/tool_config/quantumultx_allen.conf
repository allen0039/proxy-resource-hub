# > Speedtest策略

#远程订阅区
[server_remote]
# 订阅使用说明：
# 1. [server_remote] 每行第一个字段是订阅 URL，tag 是资源名称；URL 属于私密信息，公开前必须脱敏。
# 2. enabled=true 表示拉取并启用，enabled=false 表示保留但停用；当前只启用 Allen合集订阅。
# 3. update-interval 单位为秒，172800 表示每两天自动更新；也可在 Quantumult X 的资源页面手动更新。
# 4. opt-parser=false 直接读取原始订阅；只有格式不兼容、确需资源解析器时才改为 true。
# 5. 地区策略组会用 server-tag-regex 筛选所有已启用订阅的节点，节点为空时先检查订阅状态和节点名称。
# 6. 替换订阅时保留 tag、update-interval、opt-parser 和 enabled 等参数，避免影响现有策略组。
https://example.com/quantumultx/subscription-1.conf, tag=Allen合集订阅, update-interval=172800, opt-parser=false, enabled=true
https://example.com/quantumultx/subscription-2.conf, tag=白菜, update-interval=172800, opt-parser=false, enabled=false
