# Allen 维护 — Quantumult X 配置
# ===================================================================
# 修改前请先阅读以下说明，避免误改导致配置异常。
#
#全局参数区
# - server_check_url：测速检测 URL，建议保持 Cloudflare 204。
# - dns_exclusion_list：不走代理 DNS 的域名，用于避免银行/运营商相关解析异常。
# - excluded_routes：不走代理的本地/保留地址段；已包含常见内网段。
# - udp_whitelist：UDP 端口白名单。
# - 如需添加新全局参数，加在该区即可。
#
#DNS 区
# - server= 指定各域名使用国内 DNS；路由器/ NAS 等内网域名走 system。
# - 目前主 DNS 使用 119.29.29.29，可根据需要补充 DoH。
#
#策略组区
# - 业务策略组（如 OpenAI、GitHub、PayPal 等）候选项按统一顺序排列：
#   美国节点, 香港节点, 新加坡节点, 日本节点, 台湾节点, 韩国节点, 特殊节点, proxy, direct。
# - 如需新增业务组，请参照现有格式写在对应位置，并同步添加远程分流规则。
# - 地区选择组（香港节点、美国节点 等）按 server-tag-regex 匹配节点名。
# - Speedtest / Final 等特殊组已放在末尾。
#
#远程订阅区
# - 订阅 URL 已替换为占位符 1234567；如需恢复真实订阅，请将 URL 替换为实际订阅链接。
# - enabled=true 表示启用，false 表示禁用。
#
#远程分流区
# - 每条远程规则通过 force-policy 指向对应的策略组。
# - 新增业务时，建议优先添加 blackmatrix7 的 QuantumultX 规则，再同步加策略组。
# - 注意：远程规则的启用状态（enabled=true/false）会影响分流效果。
#
#远程重写区
# - 用于去广告、解锁、脚本等远程资源。
# - 当前启用资源较多，如遇冲突或异常，可逐个禁用排查。
# - 包含需 MitM 配合的资源，修改后请同步检查 [mitm] 的 hostname。
#
#本地节点区
# - 当前留空，节点主要来自远程订阅。
# - 示例行已全部注释，供参考。
#
#本地规则区
# - 已按功能分区整理（Apple/APNs、AI、直连/内网、自定义代理、购物、金融、拦截、局域网/IP）。
# - 本地规则优先于远程规则，新增域名请先确认远程规则未覆盖。
# - 规则类型优先级（非纯文本顺序）：host > host-suffix > host-keyword > user-agent > geoip & ip-cidr。
#
#本地重写区
# - 目前较少使用，主要放 YouTube 字幕改写等。
#
#任务区
# - 流媒体解锁查询、节点位置查询等。
#
#MITM 区
# - 包含 ca-p12 与 ca-passphrase，涉及 HTTPS 解密；分享配置前必须脱敏。
# - skip_validating_cert = true 跳过证书验证，可根据需要调整为 false。
# - hostname 中被 - 前缀的域名表示排除该域名不走 MitM。
# ===================================================================

[general]
server_check_url=http://cp.cloudflare.com/generate_204
dns_exclusion_list=*.cmpassport.com, *.jegotrip.com.cn, *.icitymobile.mobi, id6.me
geo_location_checker=http://ip-api.com/json/?lang=zh-CN, https://raw.githubusercontent.com/Orz-3/Orz-3/master/QuantumultX/IP.js
resource_parser_url=https://fastly.jsdelivr.net/gh/KOP-XIAO/QuantumultX@master/Scripts/resource-parser.js
excluded_routes=192.168.0.0/16, 172.16.0.0/12, 100.64.0.0/10, 10.0.0.0/8, 127.0.0.0/8, 239.255.255.250/32
server_check_timeout=2000
udp_whitelist=1-442, 444-65535

#DNS 区
[dns]
#no-ipv6
server=119.29.29.29
address=/mtalk.google.com/108.177.125.188
server=/dl.google.com/119.29.29.29
server=/dl.l.google.com/119.29.29.29
server=/update.googleapis.com/119.29.29.29
server=/*.dl.playstation.net/119.29.29.29
server=/amplifi.lan/system
server=/router.synology.com/system
server=/sila.razer.com/system
server=/router.asus.com/system
server=/routerlogin.net/system
server=/orbilogin.com/system
server=/www.LinksysSmartWiFi.com/system
server=/LinksysSmartWiFi.com/system
server=/myrouter.local/system
server=/www.miwifi.com/system
server=/miwifi.com/system
server=/mediarouter.home/system
