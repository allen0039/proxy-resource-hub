[server_remote]
# 订阅使用说明：
# 1. [server_remote] 首字段是私密订阅 URL；enabled 控制启停，当前只启用 Allen合集订阅。
# 2. update-interval 控制更新周期；非原生格式才使用 opt-parser=true。
# 3. 替换 URL 时保留 tag 和其他参数；节点为空时检查订阅状态与 server-tag-regex。
