# > 外部节点
# 订阅使用说明：
# 1. policy-path 是订阅地址，只替换等号后的 URL；订阅 URL 属于私密信息，公开分享前必须脱敏。
# 2. 当前仅启用 Allen合集订阅；删除行首 # 可启用备用订阅，添加 # 可保留但停用该订阅。
# 3. update-interval 单位为秒，86400 表示每天自动更新一次；也可在 Surge 的外部资源页面手动更新。
# 4. 地区组通过 include-other-group=Allen合集订阅读取节点；重命名订阅组后必须同步修改所有引用。
# 5. policy-regex-filter 只筛选节点名称，不会修改订阅源；筛选后无节点时先检查节点命名和正则。
Allen合集订阅 = select, policy-path=https://example.com/surge-iphone/subscription-1.conf, update-interval=86400, no-alert=0, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/black2c7/TheMagic-Icons/main/Icons/Fast.png, policy-regex-filter=^(?!.*超速ᴠ⁶)

