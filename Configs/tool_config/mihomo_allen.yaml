# ==========================================================
# 🌈 Mihomo (Clash Meta) 配置文件 - By Allen (Full Edition)
# ==========================================================

# 必读！！！
# 1. 规则在满足自己需求情况下，尽量做到精简，不要过度复杂，以免影响性能。

# ----------------------------------------------------------
# ⚓ 锚点区 (参考通用 Mihomo 模板，复用常见结构)
# ----------------------------------------------------------
# Proxy_first：默认代理优先的业务分流模板。适合 YouTube、Google、GitHub、Telegram、流媒体等海外服务。
# 先交给 美国优选 统一调度，也保留各地区节点和直连作为手动切换选项。
Proxy_first: &Proxy_first {type: select, proxies: [美国优选, 美国节点, 香港优选, 香港节点, 新加坡优选, 新加坡节点, 日本节点, 台湾节点, Proxy, 韩国节点, 直连]}

# Direct_first：默认直连优先的业务分流模板。适合 Apple、国内服务、局域网友好型服务。
# 如直连异常，可以手动切到 Proxy 或指定地区节点。
Direct_first: &Direct_first {type: select, proxies: [直连, Proxy, 香港节点, 新加坡节点, 日本节点, 台湾节点, 韩国节点, 美国节点]}

# Urltest_Base：自动测速组模板。按延迟自动选择节点，用于各地区自动组。
# tolerance 越小越偏向最低延迟，interval 控制测速间隔。
Urltest_Base: &Urltest_Base {type: url-test, include-all: true, url: 'https://www.gstatic.com/generate_204', tolerance: 20, interval: 300}

# ----------------------------------------------------------
# 🔗 代理集 (机场/订阅源)
# ----------------------------------------------------------
