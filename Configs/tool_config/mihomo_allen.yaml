# Mihomo 配置 - Allen

# 策略模板：代理优先、直连优先和地区自动测速。
Proxy_first: &Proxy_first {type: select, proxies: [香港优选, 日本优选, 新加坡优选, 美国优选, 香港节点, 台湾节点, 日本节点, 新加坡节点, 美国节点, 韩国节点, 英国节点, Proxy, 直连]}

Direct_first: &Direct_first {type: select, proxies: [直连, Proxy, 香港节点, 台湾节点, 日本节点, 新加坡节点, 美国节点, 韩国节点]}

Urltest_Base: &Urltest_Base {type: url-test, include-all: true, url: 'https://www.gstatic.com/generate_204', tolerance: 20, interval: 300}

# 代理订阅
# 订阅使用说明：
# 1. proxy-providers 下每个名称是一份订阅；URL 属于私密信息，公开前必须脱敏。
# 2. 当前只启用 subscription_1；filter 筛选节点名称，health-check 检测节点可用性。
# 3. interval 控制更新周期，proxy 仅指定订阅下载出口；未设置 skip-cert-verify，默认校验证书。
proxy-providers:
  subscription_1:
    url: "https://example.com/mihomo/subscription-1.yaml"
    type: http
    interval: 46400
    filter: '^(?!.*(拒绝|直连|群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|提示|特别|访问|支持|教程|关注|更新|作者|加入|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author|traffic))'
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连
#  白菜:
#    url: "https://example.com/mihomo/subscription-example-1.yaml"
#    type: http
#    interval: 46400
#    filter: '^(?!.*(拒绝|直连|群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|提示|特别|访问|支持|教程|关注|更新|作者|加入|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author|traffic))'
#    health-check:
#      enable: true
#      url: https://www.gstatic.com/generate_204
#      interval: 300
#    proxy: 直连
#  自建:
#    url: "https://example.com/mihomo/subscription-example-1.yaml"
#    type: http
#    interval: 46400
#    health-check:
#      enable: true
#      url: https://www.gstatic.com/generate_204
#      interval: 300
#    proxy: 直连
#  备用:
#    url: "https://example.com/mihomo/subscription-example-1.yaml"
#    type: http
#    interval: 46400
#    health-check:
#      enable: true
#      url: https://www.gstatic.com/generate_204
#      interval: 300
#    proxy: 直连

# 本地节点
proxies:
  - {name: 直连, type: direct}

# 全局配置
global-ua: clash.meta
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7894
allow-lan: true
bind-address: "*"
ipv6: false
unified-delay: true
tcp-concurrent: true
log-level: warning
find-process-mode: 'off'
profile:
  store-selected: true
  store-fake-ip: true

# 控制面板：external-ui 路径需与运行环境一致。
external-controller: 0.0.0.0:9090 # API 控制地址
secret: CHANGE_ME
external-ui: ui # 面板存放路径（通常在内核执行目录下的 ui 文件夹）
external-ui-name: zashboard # 面板名称（对应你下载的这个压缩包）
external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip" # 面板下载地址

# 流量嗅探
sniffer:
  enable: true
  sniff:
    HTTP: {ports: [80, 8080-8880], override-destination: true}
    TLS: {ports: [443, 8443]}
    QUIC: {ports: [443, 8443]}
  skip-domain:
    - "+.baidu.com"
    - 'Mijia Cloud'
    - '+.push.apple.com'
    - '+.wechat.com'
    - '+.qpic.cn'
    - '+.qq.com'
    - '+.wechatapp.com'
    - '+.apple.com'
    - '+.oray.com'
    - '+.sunlogin.net'
    - '+.vivox.com'

# TUN
tun:
  enable: true
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

# DNS
dns:
  enable: true
  listen: 0.0.0.0:53
  ipv6: false
  use-system-hosts: true
  use-hosts: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - '+.lan'
    - '+.local'
    - '+.localhost'
    - '+.msftconnecttest.com'
    - '+.msftncsi.com'
    - '+.push.apple.com'
    - '+.wechat.com'
    - '+.qpic.cn'
    - '+.qq.com'
    - '+.wechatapp.com'
    - 'time.*.com'
    - 'ntp.*.com'
    - '*.m-team.cc'
    - 'stun.*.*'
    - 'stun.*.*.*'
    - 'stun.*.*.*.*'
    - 'stun.*.*.*.*.*'
    - 'lens.l.google.com'
    - 'stun.l.google.com'
  respect-rules: true
  default-nameserver: [223.5.5.5, 119.29.29.29]
  proxy-server-nameserver: [https://223.5.5.5/dns-query, https://doh.pub/dns-query]
  direct-nameserver: [https://223.5.5.5/dns-query, https://doh.pub/dns-query]
  nameserver: [https://dns.google/dns-query, https://dns.cloudflare.com/dns-query]

