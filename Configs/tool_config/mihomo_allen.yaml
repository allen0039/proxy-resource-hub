# ----------------------------------------------------------
# 🛡️ 节点信息
# ----------------------------------------------------------
proxies:
  - {name: 直连, type: direct}

# ----------------------------------------------------------
# ⚙️ 全局配置 (基础运行参数)
# ----------------------------------------------------------
global-ua: clash.meta
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7894
allow-lan: true
bind-address: "*"
ipv6: false
unified-delay: true
tcp-concurrent: true
log-level: warning
find-process-mode: 'off'
global-client-fingerprint: chrome
profile:
  store-selected: true
  store-fake-ip: true

# ----------------------------------------------------------
# 🖥️ 控制面板 (外部管理界面)
# ----------------------------------------------------------
# 如果 external-ui 路径报错，根据环境调整。
# OpenClash: /etc/openclash/run | 裸核: /etc/mihomo/run
external-controller: 0.0.0.0:9090 # API 控制地址
secret: CHANGE_ME
external-ui: ui # 面板存放路径（通常在内核执行目录下的 ui 文件夹）
external-ui-name: zashboard # 面板名称（对应你下载的这个压缩包）
external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip" # 面板下载地址

# ----------------------------------------------------------
# 👃 嗅探器
# ----------------------------------------------------------
sniffer:
  enable: true
  sniff:
    HTTP: {ports: [80, 8080-8880], override-destination: true}
    TLS: {ports: [443, 8443]}
    QUIC: {ports: [443, 8443]}
  skip-domain:
    - "+.baidu.com"
    - 'Mijia Cloud'
    - '+.push.apple.com'
    - '+.wechat.com'
    - '+.qpic.cn'
    - '+.qq.com'
    - '+.wechatapp.com'
    - '+.apple.com'
    - '+.oray.com'
    - '+.sunlogin.net'
    - '+.vivox.com'

# ----------------------------------------------------------
# 🚇 TUN 模式
# ----------------------------------------------------------
tun:
  enable: true
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

# ----------------------------------------------------------
# 🌐 DNS 模块
# ----------------------------------------------------------
dns:
  enable: true
  listen: 0.0.0.0:53
  ipv6: false
  use-system-hosts: true
  use-hosts: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - '+.lan'
    - '+.local'
    - '+.localhost'
    - '+.msftconnecttest.com'
    - '+.msftncsi.com'
    - '+.push.apple.com'
    - '+.wechat.com'
    - '+.qpic.cn'
    - '+.qq.com'
    - '+.wechatapp.com'
    - 'time.*.com'
    - 'ntp.*.com'
    - '*.m-team.cc'
    - 'stun.*.*'
    - 'stun.*.*.*'
    - 'stun.*.*.*.*'
    - 'stun.*.*.*.*.*'
    - 'lens.l.google.com'
    - 'stun.l.google.com'
  respect-rules: true
  default-nameserver: [223.5.5.5, 119.29.29.29]
  proxy-server-nameserver: [https://223.5.5.5/dns-query, https://doh.pub/dns-query]
  direct-nameserver: [https://223.5.5.5/dns-query, https://doh.pub/dns-query]
  nameserver: [https://dns.google/dns-query, https://dns.cloudflare.com/dns-query]

# ----------------------------------------------------------
# 🚩 出站策略组
# ----------------------------------------------------------
proxy-groups:
  - {name: Proxy, type: select, proxies: [美国优选, 美国节点, 香港优选, 香港节点, 新加坡优选, 新加坡节点, 日本优选, 日本节点, 台湾节点, 韩国节点, 自动选择, 全部节点, 美国故转, 香港故转, 新加坡故转, 日本故转, 直连]}
  - {name: YouTube, <<: *Proxy_first}
  - {name: Google, <<: *Proxy_first}
  - {name: OpenAI, <<: *Proxy_first}
  - {name: GitHub, <<: *Proxy_first}
  - {name: TikTok, <<: *Proxy_first}
  - {name: Telegram, <<: *Proxy_first}
  - {name: Netflix, <<: *Proxy_first}
  - {name: Emby, <<: *Proxy_first}
  - {name: OneDrive, <<: *Proxy_first}
  - {name: Microsoft, <<: *Proxy_first}
  - {name: 哔哩哔哩, type: select, proxies: [台湾节点, 香港节点, 新加坡节点, 全部节点, Proxy, 直连]}
  - {name: 特殊媒体, <<: *Proxy_first}
  - {name: Speedtest, <<: *Proxy_first}
  - {name: PayPal, <<: *Proxy_first}
  - {name: Amazon, <<: *Proxy_first}
  - {name: Apple, <<: *Direct_first}
  - {name: 游戏平台, <<: *Proxy_first}
  - {name: 直连策略, type: select, proxies: [直连, Proxy]}
  - {name: Final, <<: *Proxy_first}

  - {name: 香港节点, type: select, include-all: true, filter: '(?i)(🇭🇰|香港|\b(HK|HKG|Hong)(\d+)?\b)', exclude-filter: '(?i)(回国|校园|游戏|🎮|\bGAME\b)'}
  - {name: 台湾节点, type: select, include-all: true, filter: '(?i)(🇹🇼|台湾|\b(TW|TWN|Tai|Taiwan)(\d+)?\b)', exclude-filter: '(?i)(回国|校园|游戏|🎮|\bGAME\b)'}
  - {name: 日本节点, type: select, include-all: true, filter: '(?i)(🇯🇵|日本|川日|东京|大阪|泉日|埼玉|\b(JP|JPN|Japan)(\d+)?\b)', exclude-filter: '(?i)(回国|校园|游戏|🎮|\bGAME\b)'}
  - {name: 韩国节点, type: select, include-all: true, filter: '(?i)(🇰🇷|韩国|韓|首尔|\b(KR|KOR|Korea)(\d+)?\b)', exclude-filter: '(?i)(回国|校园|游戏|🎮|\bGAME\b)'}
  - {name: 新加坡节点, type: select, include-all: true, filter: '(?i)(🇸🇬|新加坡|狮城|\b(SG|SGP|Singapore)(\d+)?\b)', exclude-filter: '(?i)(回国|校园|游戏|🎮|\bGAME\b)'}
  - {name: 美国节点, type: select, include-all: true, filter: '(?i)(🇺🇸|🇺🇲|美国|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|\b(US|USA|United States)(\d+)?\b)', exclude-filter: '(?i)(回国|校园|游戏|🎮|\bGAME\b)'}
  - {name: 香港故转, type: fallback, include-all: true, url: 'https://www.gstatic.com/generate_204', tolerance: 20, interval: 300, filter: '(?i)(🇭🇰|香港|\b(HK|HKG|Hong)(\d+)?\b)', exclude-filter: '(?i)(回国|校园|游戏|🎮|\bGAME\b)'}
  - {name: 日本故转, type: fallback, include-all: true, url: 'https://www.gstatic.com/generate_204', tolerance: 20, interval: 300, filter: '(?i)(🇯🇵|日本|川日|东京|大阪|泉日|埼玉|\b(JP|JPN|Japan)(\d+)?\b)', exclude-filter: '(?i)(回国|校园|游戏|🎮|\bGAME\b)'}
  - {name: 新加坡故转, type: fallback, include-all: true, url: 'https://www.gstatic.com/generate_204', tolerance: 20, interval: 300, filter: '(?i)(🇸🇬|新加坡|狮城|\b(SG|SGP|Singapore)(\d+)?\b)', exclude-filter: '(?i)(回国|校园|游戏|🎮|\bGAME\b)'}
  - {name: 美国故转, type: fallback, include-all: true, url: 'https://www.gstatic.com/generate_204', tolerance: 20, interval: 300, filter: '(?i)(🇺🇸|🇺🇲|美国|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|\b(US|USA|United States)(\d+)?\b)', exclude-filter: '(?i)(回国|校园|游戏|🎮|\bGAME\b)'}
  - {name: 香港优选, <<: *Urltest_Base, filter: '(?i)(🇭🇰|香港|\b(HK|HKG|Hong)(\d+)?\b)', exclude-filter: '(?i)(回国|校园|游戏|🎮|\bGAME\b)'}
  - {name: 日本优选, <<: *Urltest_Base, filter: '(?i)(🇯🇵|日本|川日|东京|大阪|泉日|埼玉|\b(JP|JPN|Japan)(\d+)?\b)', exclude-filter: '(?i)(回国|校园|游戏|🎮|\bGAME\b)'}
  - {name: 新加坡优选, <<: *Urltest_Base, filter: '(?i)(🇸🇬|新加坡|狮城|\b(SG|SGP|Singapore)(\d+)?\b)', exclude-filter: '(?i)(回国|校园|游戏|🎮|\bGAME\b)'}
